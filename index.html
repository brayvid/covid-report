<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NYC Covid Report | Blake Rayvid</title>
    <meta name="description" content="Track the latest COVID-19 trends in New York City with our daily updated dashboard. View 7-day averages for new cases, hospitalizations, and deaths. Data sourced directly from NYC Health.">
    <link rel="canonical" href="https://covidnyc.blakerayvid.com/">
    <meta name="author" content="Blake Rayvid">

    <!-- Open Graph & Twitter Card Tags (kept from your original and are good) -->
    <meta property="og:title" content="NYC Covid Report | Blake Rayvid">
    <meta property="og:description" content="Track the latest COVID-19 trends in New York City with our daily updated dashboard, visualizing cases, hospitalizations, and deaths.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://covidnyc.blakerayvid.com/">
    <meta property="og:image" content="https://covidnyc.blakerayvid.com/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="NYC Covid Report | Blake Rayvid">
    <meta name="twitter:description" content="Track the latest COVID-19 trends in New York City with our daily updated dashboard, visualizing cases, hospitalizations, and deaths.">
    <meta name="twitter:image" content="https://covidnyc.blakerayvid.com/og-image.png">

    <!-- Google Fonts: Inter (for a clean, modern look) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Local Stylesheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Preconnect for Performance (kept from your original and are good) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>

    <!-- Google Analytics (kept from your original) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-480YZ7098T"></script>
    <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-480YZ7098T');
    </script>
</head>
<body>

    <header class="dashboard-header">
        <div class="container">
            <h1>Coronavirus in NYC</h1>
            <p class="header-subtitle">Tracking 7-day moving averages for New York City.</p>
        </div>
    </header>

    <main class="container dashboard-main">
        <!-- Initial loading state, hidden when data loads -->
        <section id="loading-state" class="dashboard-card status-message">
            <p>Loading latest data... <span class="spinner"></span></p>
        </section>

        <!-- Error state, shown if data fails to load -->
        <section id="error-state" class="dashboard-card status-message error-message" style="display: none;">
            <p>Error loading data. Please try again later. <br><small id="error-details"></small></p>
        </section>

        <!-- Dashboard content, hidden until data is ready -->
        <section id="dashboard-content" class="dashboard-grid" style="display: none;">
            <div class="dashboard-card metrics-card">
                <h2>Latest Metrics</h2>
                <p class="data-date" id="data-date"></p>
                <table class="metrics-table">
                    <tbody>
                        <tr>
                          <th scope="row">New Cases</th>
                          <td id="cases-value">--</td>
                        </tr>
                        <tr>
                          <th scope="row">Hospitalizations</th>
                          <td id="hosp-value">--</td>
                        </tr>
                        <tr>
                          <th scope="row">Deaths</th>
                          <td id="deaths-value">--</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="dashboard-card chart-card">
                <h2>30-Day Case Trend</h2>
                <div class="chart-container">
                    <canvas id="myChart" role="img" aria-label="A line chart showing the 30-day trend of new COVID-19 cases in NYC."></canvas>
                </div>
            </div>
        </section>
    </main>

    <footer class="dashboard-footer">
        <div class="container">
            <p><a href="https://github.com/nychealth/coronavirus-data/blob/master/latest/now-data-by-day.csv" rel="noopener noreferrer" target="_blank">NYC Health</a> | 
            <a href="https://github.com/brayvid/covid-report" rel="noopener noreferrer" target="_blank">GitHub</a> | 
            <a href="https://blakerayvid.com" rel="noopener noreferrer" target="_blank">Portfolio</a></p>
        </div>
    </footer>

    <!-- Chart.js - Corrected integrity attribute based on YOUR console output -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" integrity="sha256-0q+JdOlScWOHcunpUk21uab1jW7C1deBQARHtKMcaB4=" crossorigin="anonymous"></script>
    
    <!-- Your Application Script -->
    <script src="script.js" defer></script>
</body> 
</html>
